server:
  port: 4444

spring:
  application:
    name: upms
  cloud:
    nacos:
      username: @nacos.username@
      password: @nacos.password@
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        namespace: dev
  config:
    import:
      - nacos:application.yml
      - nacos:${spring.application.name}.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
cm:
