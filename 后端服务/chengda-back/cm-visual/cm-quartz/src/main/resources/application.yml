server:
  port: 5007

spring:
  application:
    name: quartz
  cloud:
    nacos:
      username: @nacos.username@
      password: @nacos.password@
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
  config:
    import:
      - optional:nacos:application.yml
      - optional:nacos:${spring.application.name}.yml